<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>erpgenworldmodel - Spark.js viewer</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0d10;
        color: #e6edf3;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        max-width: 360px;
        padding: 10px 12px;
        background: rgba(11, 13, 16, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.4;
        white-space: pre-wrap;
        backdrop-filter: blur(4px);
      }
      #hud b {
        color: #fbbf24;
      }
      #status {
        position: fixed;
        bottom: 12px;
        left: 12px;
        font-size: 12px;
        color: #94a3b8;
      }
      .err {
        color: #f87171 !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">loading…</div>
    <div id="status">spark.js</div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
          "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.0.0/spark.module.js"
        }
      }
    </script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
