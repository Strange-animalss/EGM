# Default EGMOR configuration.
#
# ============================================================================
# PROVIDER CONFIG EXAMPLES — uncomment one block, leave the others as comments.
# Switching the API source is just a few lines under `openai:` below.
# ============================================================================
#
# Option 1: OpenAI DIRECT (cleanest, gpt-image-2 supports any size up to ~3840
#                          long-edge, multiples of 16, ratio <= 3:1)
#   provider: "openai"
#   base_url: ""                              # empty = api.openai.com
#   api_key_env: "OPENAI_API_KEY"
#   model: "gpt-image-2"
#   text_model: "gpt-5.5-pro"
#   size: "2048x1024"                         # real 2:1 ERP
#
# Option 2: OpenAI-compatible relay (super.shangliu.org / OneAPI / LiteLLM ...)
#   provider: "openai"                        # SAME path as Option 1
#   base_url: "https://super.shangliu.org/v1"
#   api_key_env: "OPENAI_API_KEY"             # relay-issued key
#   model: "gpt-image-2"                      # relay must route to real
#                                             # gpt-image-2, NOT gpt-image-1.5
#   text_model: "gpt-5.5"                     # some relays don't have -pro
#   size: "2048x1024"
#
# Option 3: OpenRouter (fallback only — output locked to 1024x1024,
#                       no /v1/images/edits endpoint, no size override)
#   provider: "openrouter"
#   base_url: "https://openrouter.ai/api/v1"
#   api_key_env: "OPENAI_API_KEY"             # sk-or-v1-... key
#   model: "openai/gpt-image-2"               # or "openai/gpt-5.4-image-2"
#   text_model: "openai/gpt-5.5-pro"
#   size: "1024x1024"                         # OpenRouter cannot do 2:1
# ============================================================================


cuboid:
  # Cuboid space (meters). x = width, y = depth, z = height.
  size_xyz: [4.0, 4.0, 3.0]
  center_world: [0.0, 0.0, 1.5]
  # Fraction by which corner poses are pulled toward the center.
  corner_inset: 0.20
  # "center"  — every corner camera looks at the room centroid (default).
  # "outward" — every corner camera looks away from the room centroid.
  # "random"  — bounded yaw/pitch jitter, useful for ablations.
  # "level"   — identity rotation (same orientation as pose_0). Keeps the
  #             ERP poles aligned with world up/down across all 9 views; the
  #             cleanest match for how panorama models are trained, and the
  #             cheapest geometric assumption for warp+inpaint.
  corner_lookat: "center"

poses:
  initial:
    xyz_local: [0.0, 0.0, 0.0]
    euler_xyz_deg: [0.0, 0.0, 0.0]
  # "auto_8_corners" | list of poses
  generation: "auto_8_corners"

openai:
  # OpenAI-compatible relay: ChatFire (Images + Chat share this base_url + relay key).
  # Official OpenAI: set `base_url: ""` and use an OpenAI `sk-...` key in secrets.local.yaml.
  provider: "openai"
  base_url: "https://api.chatfire.cn/v1"
  api_key_env: "OPENAI_API_KEY"
  # Leave empty in git. For YAML-stored key on YOUR machine only: use
  # `config/secrets.local.yaml` (see secrets.local.yaml.example; file is gitignored).
  api_key: ""                                  # NEVER commit a real key in default.yaml
  model: "gpt-image-2"
  size: "2048x1024"
  rgb_quality: "high"
  request_timeout_sec: 600
  max_retries: 4
  retry_backoff_sec: 5.0
  cache_dir: "outputs/.openai_cache"
  # Must support `v1/chat/completions` (SceneExpander). Override in secrets.local if needed.
  text_model: "gpt-4o-mini"
  text_model_api_key_env: "OPENAI_API_KEY"
  reasoning_effort: "high"
  # OpenRouter ranking headers; harmless on other providers.
  http_referer: "https://github.com/Strange-animalss/EGMOR"
  app_title: "EGMOR"

# How to drive corner poses from the centre RGB.
#   * "warp_inpaint" — forward-warp centre RGBD to the corner pose, build a
#     hole mask, then call images.edit(image=warped_rgb, mask=hole_mask,
#     prompt) so the model only fills disocclusions. Strongest geometric
#     consistency between the 9 ERPs.
#   * "i2i"          — images.edit with the centre RGB as the reference and
#     no mask (whole-image i2i).
#   * "generate"     — text-to-image only, no reference. Weakest consistency.
nvs_strategy:
  corner_method: "warp_inpaint"
  hole_dilate_px: 4

# Optional gpt-image-2 "decoder" experiment: ask the model to convert a
# generated RGB ERP into a depth or normal map, save the result, and compare
# against DAP-V2 / analytic normals (the trusted ground truth used by every
# downstream stage). Only the listed pose indices are run, to keep API
# budget bounded.
decoder_experiment:
  enabled: true
  experiment_poses: [0, 4]

prompt:
  scene_default: "an empty specialty coffee shop, late morning"
  # null = fresh seed each run; integer = reproducible (subject to LLM determinism).
  seed: null

nvs:
  # Depth-Anything-V2 model size. small | base | large.
  dap_model_size: "base"
  # Robust 5/95-percentile linear scale into [depth_near_m, depth_far_m].
  depth_near_m: 0.3
  depth_far_m: 12.0

perspective:
  # 12 yaw x 4 pitch = 48 views, column-first zigzag (SAM3-video friendly).
  scheme: "persp48_zigzag"
  fov_deg: 90.0
  out_size: 1024

fastgs:
  repo_path: "third_party/FastGS-Instance/FastGS"
  iterations: 1500
  init_from_points3d: true
  init_max_points: 200000
  init_voxel_m: 0.04
  extra_args: []

viewer:
  port: 8765
  bind: "127.0.0.1"
  default_run_id: ""

run:
  outputs_dir: "outputs/runs"
  run_id: ""
